<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding: 15px;
  padding-bottom: 80px; /* 🔥 biar gak ketutup menu bawah */
}

/* HEADER */
.header {
  background: linear-gradient(to right, #f59e0b, #f97316);
  padding: 15px;
  border-radius: 16px;
  color: white;
  margin-bottom: 15px;
}

/* CARD */
.container {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeUp 0.5s ease;
}

/* INPUT */
.input-group {
  margin-top: 15px;
}

input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
  opacity: 0.8;
}

/* RESULT */
.result {
  margin-top: 20px;
  font-size: 14px;
}

/* 🔥 CARD INFO */
.card-info {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-top: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  animation: fadeUp 0.5s ease;
  transition: 0.2s;
}

.card-info:hover {
  transform: translateY(-3px);
}

.card-info.highlight {
  background: linear-gradient(to right, orange, red);
  color: white;
  font-weight: bold;
}

/* 🔥 MENU BAWAH */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 12px;
  border-top: 1px solid #ddd;
}

/* 🔥 ANIMASI */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  Selamat datang, Nasabah 👋
</div>

<div class="container">

  <h2>Form Pengajuan</h2>

  <!-- NAMA -->
  <div class="input-group">
    <input id="nama" placeholder="Nama">
  </div>

  <!-- NIK -->
  <div class="input-group">
    <input id="nik" placeholder="NIK">
  </div>

  <!-- ✅ FIX POSISI (DI LUAR) -->
  <div id="success" style="color:green; margin-top:10px; display:none;">
    ✔ NIK valid
  </div>

  <!-- GAJI -->
  <div class="input-group">
    <input id="gaji" placeholder="Penghasilan">
  </div>

  <!-- PINJAMAN -->
  <div class="input-group">
    <input id="pinjam" placeholder="Pinjaman">
  </div>

  <!-- DURASI -->
  <div class="input-group">
    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
      <option value="120">10 Tahun</option>
    </select>
  </div>

  <button onclick="proses()">Ajukan</button>

  <div class="result" id="hasil"></div>

</div>

<script>

function proses(){

  let hasil = document.getElementById("hasil");
  let nik = document.getElementById("nik").value;

  if(nik.length < 16){
    document.getElementById("success").style.display = "none";
    alert("NIK tidak valid");
    return;
  }

  document.getElementById("success").style.display = "block";

  // 🔥 STEP 1 - LOADING BAR
  hasil.innerHTML = `
    <div style="text-align:center;">
      ⏳ Memverifikasi data...<br><br>
      <div style="height:6px; background:#eee; border-radius:10px;">
        <div id="bar" style="height:6px; width:10%; background:orange; border-radius:10px;"></div>
      </div>
    </div>
  `;

  let width = 10;
  let interval = setInterval(() => {
    width += 10;
    document.getElementById("bar").style.width = width + "%";

    if(width >= 100){
      clearInterval(interval);
    }
  }, 200);

  // 🔥 STEP 2 - ANALISA
  setTimeout(() => {

    hasil.innerHTML = "📊 Menganalisa data...";

    setTimeout(() => {

      let gaji = parseInt(document.getElementById("gaji").value);
      let pinjam = parseInt(document.getElementById("pinjam").value);
      let bulan = parseInt(document.getElementById("bulan").value);

      let limit = gaji * 5;
      let cicilan = pinjam / bulan;

      let status = "Disetujui ✅";

      if(pinjam > limit){
        status = "Ditolak ❌";
      }

      // 🔥 FINAL RESULT (KEREN)
      hasil.innerHTML = `
        <div style="background:#fff; padding:15px; border-radius:12px;">
          <b>Limit:</b> Rp ${limit.toLocaleString("id-ID")}<br>
          <b>Cicilan:</b> Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br><br>
          <h3>${status}</h3>
        </div>
      `;

    }, 1500);

  }, 2000);
</script>

</body>
</html>

<div class="card-info">⚡ Proses cepat</div>
<div class="card-info">💰 Tanpa biaya admin</div>
<div class="card-info highlight">🔥 Limit besar</div>

<div class="bottom-bar">
  <div>🏠</div>
  <div>💳</div>
  <div>👤</div>
</div>
