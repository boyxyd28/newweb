<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:linear-gradient(to bottom,#f9a825,#f57c00);
  min-height:100vh;
}

/* HEADER APP */
.header{
  position:sticky;
  top:0;
  background:linear-gradient(to right,#f59e0b,#f97316);
  color:#fff;
  padding:16px;
  z-index:10;
}

/* CONTENT */
.content{
  padding:20px;
  padding-bottom:100px;
}

/* SALDO CARD */
.saldo{
  background:linear-gradient(to right,#f97316,#fb923c);
  color:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

.saldo h1{
  font-size:28px;
  margin-top:5px;
}

/* INPUT */
.input-group{
  margin-bottom:14px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid #333;
  background:transparent;
  font-size:16px;
}

/* BUTTON FIXED */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:15px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.footer button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(to right,#f59e0b,#f97316);
  color:white;
  font-size:18px;
}

/* STATUS */
.status{
  margin-top:15px;
  font-weight:bold;
}

/* LOADING DOT */
.loading span{
  animation: blink 1s infinite;
}
@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <b>Dashboard</b>
</div>

<div class="content">

  <!-- SALDO -->
  <div class="saldo">
    <div>Limit Pinjaman</div>
    <h1 id="saldo">Rp 0</h1>
  </div>

  <!-- FORM -->
  <div class="input-group">
    <input id="nama" placeholder="Nama">
  </div>

  <div class="input-group">
    <input id="nik" placeholder="NIK">
  </div>

  <div class="input-group">
    <input id="gaji" placeholder="Penghasilan">
  </div>

  <div class="input-group">
    <input id="pinjam" placeholder="Pinjaman">
  </div>

  <div class="input-group">
    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
      <option value="120">10 Tahun</option>
    </select>
  </div>

  <div id="status" class="status"></div>

</div>

<!-- BUTTON BAWAH -->
<div class="footer">
  <button id="btn">Ajukan Sekarang</button>
</div>

<script>

// FORMAT UANG
["gaji","pinjam"].forEach(id=>{
  document.getElementById(id).addEventListener("input",function(e){
    let angka=e.target.value.replace(/\D/g,"");
    e.target.value=angka.replace(/\B(?=(\d{3})+(?!\d))/g,".");
  });
});

// ANIMASI SALDO
function animasi(target){
  let x=0;
  let el=document.getElementById("saldo");

  let i=setInterval(()=>{
    x+=target/20;
    if(x>=target){x=target;clearInterval(i);}
    el.innerText="Rp "+Math.floor(x).toLocaleString("id-ID");
  },50);
}

// PROSES
document.getElementById("btn").onclick=()=>{

  let nama=document.getElementById("nama").value;
  let nik=document.getElementById("nik").value;
  let gaji=parseInt(document.getElementById("gaji").value.replace(/\./g,""));
  let pinjam=parseInt(document.getElementById("pinjam").value.replace(/\./g,""));
  let bulan=parseInt(document.getElementById("bulan").value);

  let status=document.getElementById("status");

  if(!nama || nik.length<16 || !gaji || !pinjam){
    alert("Lengkapi data");
    return;
  }

  status.innerHTML="Memverifikasi<span>.</span><span>.</span><span>.</span>";

  setTimeout(()=>{
    status.innerHTML="Menganalisa data<span>.</span><span>.</span><span>.</span>";

    setTimeout(()=>{
      let limit=gaji*5;
      let cicilan=pinjam/bulan;

      animasi(limit);

      status.innerHTML=
      "Limit: Rp "+limit.toLocaleString("id-ID")+"<br>"+
      "Cicilan: Rp "+Math.floor(cicilan).toLocaleString("id-ID");

    },1500);

  },1500);

};
</script>

</body>
</html>
