<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengajuan Pinjaman</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding: 15px;
}

/* HEADER */
.header {
  background: linear-gradient(to right, #f59e0b, #f97316);
  padding: 15px;
  border-radius: 16px;
  color: white;
  margin-bottom: 15px;
}

/* CONTAINER */
.container {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  max-width: 480px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
.title {
  text-align: center;
  margin-bottom: 20px;
}

/* SECTION */
.section {
  margin-top: 20px;
}

.section h3 {
  font-size: 14px;
  background: #fbbf24;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 10px;
}

/* INPUT */
.input-group {
  margin-bottom: 12px;
}

.input-group label {
  font-size: 12px;
  color: #555;
}

.input-group input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

/* RESULT */
.result {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div style="display:flex; align-items:center; gap:10px;">
      <img src="https://i.pravatar.cc/100" style="width:40px; border-radius:50%;">
      <div>
        <div style="font-size:12px;">Selamat datang</div>
        <div style="font-weight:bold;">Nasabah</div>
      </div>
    </div>
    <div onclick="showNotif()" style="cursor:pointer;">🔔</div>
  </div>
</div>

<!-- FORM -->
<div class="container">

  <div class="title">
    <h2>Form Pengajuan</h2>
  </div>

  <!-- DATA -->
  <div class="section">
    <h3>Data</h3>

    <div class="input-group">
      <label>Nama</label>
      <input id="nama">
    </div>

    <div class="input-group">
      <label>NIK</label>
      <input id="nik">
    </div>

    <div class="input-group">
      <label>Pekerjaan</label>
      <input id="kerja" list="listKerja">
      <datalist id="listKerja">
        <option>Polisi</option>
        <option>Dokter</option>
        <option>Karyawan</option>
        <option>Wiraswasta</option>
        <option>Freelance</option>
      </datalist>
    </div>

    <div class="input-group">
      <label>Penghasilan</label>
      <input id="gaji">
    </div>

    <div class="input-group">
      <label>Pinjaman</label>
      <input id="pinjam">
    </div>

    <div class="input-group">
      <label>Durasi</label>
      <select id="bulan">
        <option value="12">1 Tahun</option>
        <option value="24">2 Tahun</option>
        <option value="60">5 Tahun</option>
        <option value="120">10 Tahun</option>
      </select>
    </div>

  </div>

  <button onclick="proses()">Ajukan</button>

  <div id="hasil" class="result"></div>

</div>

<script>

// FORMAT RUPIAH
function formatRupiah(angka) {
  return angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function pasangFormat(id) {
  const input = document.getElementById(id);
  input.addEventListener("input", function (e) {
    let angka = e.target.value.replace(/\D/g, "");
    e.target.value = angka ? formatRupiah(angka) : "";
  });
}

pasangFormat("gaji");
pasangFormat("pinjam");

// NOTIF
function showNotif() {
  alert("Tidak ada notifikasi");
}

// PROSES PINJAMAN
function proses() {
  const nama = document.getElementById("nama").value.trim();
  const nik = document.getElementById("nik").value.trim();
  const gaji = parseInt(document.getElementById("gaji").value.replace(/\./g, ""));
  const pinjam = parseInt(document.getElementById("pinjam").value.replace(/\./g, ""));
  const bulan = parseInt(document.getElementById("bulan").value);
  const hasil = document.getElementById("hasil");

  if (!nama || nik.length < 16 || !gaji || !pinjam || !bulan) {
    alert("Lengkapi data");
    return;
  }

  hasil.innerHTML = "<b>Status:</b> Sedang memeriksa kelayakan nasabah...";

  setTimeout(() => {
    let limit = gaji * 5;
    let cicilan = pinjam / bulan;

    let status = "Disetujui";
    if (pinjam > limit) status = "Ditolak";

    hasil.innerHTML = `
      <b>Limit:</b> Rp ${limit.toLocaleString("id-ID")}<br>
      <b>Cicilan:</b> Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
      <b>Status:</b> ${status}
    `;
  }, 2000);
}

</script>

</body>
</html>
