<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Pinjaman</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:linear-gradient(to bottom,#f9a825,#f57c00);
  padding:15px;
  padding-bottom:80px;
}

.header{
  background:linear-gradient(to right,#f59e0b,#f97316);
  padding:15px;
  border-radius:16px;
  color:white;
  margin-bottom:15px;
}

.container{
  background:white;
  border-radius:20px;
  padding:20px;
}

input,select{
  width:100%;
  border:none;
  border-bottom:1px solid #ccc;
  padding:10px 0;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:20px;
  padding:15px;
  border-radius:30px;
  border:none;
  background:linear-gradient(to right,#f59e0b,#f97316);
  color:white;
  font-weight:bold;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboardPage">
  <div class="header">Selamat datang 👋</div>

  <div style="background:white;padding:15px;border-radius:16px;">
    👤 <b id="namaUser">Nasabah</b><br><br>
    💰 Limit: <b id="limitUser">Rp 0</b>
  </div>
</div>

<!-- PENGAJUAN -->
<div id="pengajuanPage" style="display:none;">
  <div class="container">

    <h2>Pengajuan Pinjaman</h2>

    <input id="nama" placeholder="Nama">
    <input id="nik" placeholder="NIK">
    <input id="gaji" placeholder="Penghasilan">
    <input id="pinjam" placeholder="Pinjaman">

    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
    </select>

    <button onclick="proses()">Ajukan</button>

    <div id="hasil"></div>

  </div>
</div>

<!-- RIWAYAT -->
<div id="riwayatPage" style="display:none; padding:15px;">
  <h3>🧾 Riwayat</h3>
  <div id="riwayatBox"></div>
</div>

<!-- PENCAIRAN -->
<div id="cairPage" style="display:none; padding:15px;">
  <h3>💸 Pencairan Dana</h3>
  <input placeholder="Nama Bank">
  <input placeholder="Nomor Rekening">
  <input placeholder="Nama Pemilik">
  <button onclick="notif('Dana sedang diproses 💸')">Cairkan</button>
</div>

<!-- PROFIL -->
<div id="profilPage" style="display:none; padding:15px;">
  <h3>👤 Profil</h3>
  Nama: <span id="profilNama"></span><br>
  NIK: <span id="profilNik"></span>
</div>

<!-- NOTIF -->
<div id="notifPage" style="display:none; padding:15px;">
  <h3>🔔 Notifikasi</h3>
  <div id="notifBox"></div>
</div>

<!-- MENU -->
<div class="bottom-bar">
  <div onclick="showPage('dashboardPage')">🏠</div>
  <div onclick="showPage('pengajuanPage')">📋</div>
  <div onclick="showPage('riwayatPage')">🧾</div>
  <div onclick="showPage('cairPage')">💸</div>
  <div onclick="showPage('profilPage')">👤</div>
  <div onclick="showPage('notifPage')">🔔</div>
</div>

<script>

function showPage(page){
  ["dashboardPage","pengajuanPage","riwayatPage","cairPage","profilPage","notifPage"]
  .forEach(p=>document.getElementById(p).style.display="none");

  document.getElementById(page).style.display="block";
}

function proses(){

  let hasil = document.getElementById("hasil");

  hasil.innerHTML = "🚀 Memproses...";
  new Audio("https://www.soundjay.com/mechanical/sounds/rocket-launch-01.mp3").play();

  setTimeout(()=>{

    let gaji = parseInt(document.getElementById("gaji").value || 0);
    let pinjam = parseInt(document.getElementById("pinjam").value || 0);
    let bulan = parseInt(document.getElementById("bulan").value);

    let limit = gaji * 5;
    let cicilan = pinjam / bulan;

    let status = pinjam > limit ? "❌ Ditolak" : "✅ Disetujui";

    hasil.innerHTML = `
      <div style="background:white;padding:15px;border-radius:12px;">
        💰 Limit: Rp ${limit.toLocaleString("id-ID")}<br>
        Cicilan: Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
        Status: ${status}
      </div>
    `;

    localStorage.setItem("nama", document.getElementById("nama").value);
    localStorage.setItem("nik", document.getElementById("nik").value);
    localStorage.setItem("limit", limit);

    simpanRiwayat(pinjam,status);
    tampilRiwayat();

    notif("Pengajuan berhasil diproses");

    loadData();

  },1500);
}

function simpanRiwayat(pinjam,status){
  let r = JSON.parse(localStorage.getItem("riwayat"))||[];
  r.push({pinjam,status});
  localStorage.setItem("riwayat",JSON.stringify(r));
}

function tampilRiwayat(){
  let r = JSON.parse(localStorage.getItem("riwayat"))||[];
  let html="";
  r.forEach(i=>{
    html+=`<div style="background:white;margin-top:10px;padding:10px;border-radius:10px;">
      Rp ${i.pinjam.toLocaleString("id-ID")} - ${i.status}
    </div>`;
  });
  document.getElementById("riwayatBox").innerHTML=html;
}

function notif(text){
  let n = document.getElementById("notifBox");
  n.innerHTML = <div style="background:white;padding:10px;margin-top:10px;border-radius:10px;">${text}</div> + n.innerHTML;
}

function loadData(){
  let nama = localStorage.getItem("nama")||"Nasabah";
  let nik = localStorage.getItem("nik")||"-";
  let limit = localStorage.getItem("limit")||0;

  document.getElementById("namaUser").innerText=nama;
  document.getElementById("limitUser").innerText="Rp "+parseInt(limit).toLocaleString("id-ID");
  document.getElementById("profilNama").innerText=nama;
  document.getElementById("profilNik").innerText=nik;
}

window.onload = loadData;

</script>

</body>
</html>
