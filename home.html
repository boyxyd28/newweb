<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Pinjaman Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:linear-gradient(to bottom,#f9a825,#f57c00);
  padding:15px;
  padding-bottom:80px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:16px;
  margin-top:10px;
}

/* INPUT */
input,select{
  width:100%;
  border:none;
  border-bottom:1px solid #ccc;
  padding:10px 0;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:20px;
  padding:15px;
  border-radius:30px;
  border:none;
  background:linear-gradient(to right,#f59e0b,#f97316);
  color:white;
  font-weight:bold;
}

/* NAV */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboardPage">

  <div style="
    background:linear-gradient(to right,#f59e0b,#f97316);
    padding:20px;
    border-radius:20px;
    color:white;
  ">
    <div>Selamat datang 👋</div>
    <div id="namaUser" style="font-weight:bold;">Nasabah</div>

    <div style="margin-top:10px;">Saldo Anda</div>
    <div id="saldo" style="font-size:26px;font-weight:bold;">Rp 0</div>
  </div>

  <!-- QUICK MENU -->
  <div style="margin-top:15px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
    <div onclick="showPage('pengajuanPage')" class="card">💰<br><small>Pinjam</small></div>
    <div onclick="showPage('riwayatPage')" class="card">🧾<br><small>Riwayat</small></div>
    <div onclick="showPage('cairPage')" class="card">💸<br><small>Cair</small></div>
    <div onclick="showPage('profilPage')" class="card">👤<br><small>Profil</small></div>
  </div>

  <!-- INFO -->
  <div class="card">⚡ Proses cepat 5 menit</div>
  <div class="card">🔒 Data aman & terenkripsi</div>
  <div class="card" style="background:linear-gradient(to right,#f59e0b,#f97316); color:white;">
    🔥 Limit hingga 50 juta
  </div>

</div>

<!-- PENGAJUAN -->
<div id="pengajuanPage" style="display:none;">
  <div class="card">
    <h3>Pengajuan Pinjaman</h3>

    <input id="nama" placeholder="Nama">
    <input id="nik" placeholder="NIK">
    <input id="gaji" placeholder="Penghasilan">
    <input id="pinjam" placeholder="Pinjaman">

    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
    </select>

    <button onclick="proses()">Ajukan</button>

    <div id="hasil"></div>
  </div>
</div>

<!-- RIWAYAT -->
<div id="riwayatPage" style="display:none; padding:10px;">
  <h3>🧾 Riwayat</h3>
  <div id="riwayatBox"></div>
</div>

<!-- PENCAIRAN -->
<div id="cairPage" style="display:none; padding:10px;">
  <h3>💸 Pencairan</h3>
  <input placeholder="Nama Bank">
  <input placeholder="Nomor Rekening">
  <input placeholder="Nama Pemilik">
  <button onclick="notif('Dana sedang diproses 💸')">Cairkan</button>
</div>

<!-- PROFIL -->
<div id="profilPage" style="display:none; padding:10px;">
  <h3>👤 Profil</h3>
  Nama: <span id="profilNama"></span><br>
  NIK: <span id="profilNik"></span>
</div>

<!-- NOTIF -->
<div id="notifPage" style="display:none; padding:10px;">
  <h3>🔔 Notifikasi</h3>
  <div id="notifBox"></div>
</div>

<!-- NAV -->
<div class="bottom-bar">
  <div onclick="showPage('dashboardPage')">🏠</div>
  <div onclick="showPage('pengajuanPage')">📋</div>
  <div onclick="showPage('riwayatPage')">🧾</div>
  <div onclick="showPage('cairPage')">💸</div>
  <div onclick="showPage('profilPage')">👤</div>
  <div onclick="showPage('notifPage')">🔔</div>
</div>

<script>

// NAVIGASI
function showPage(page){
  ["dashboardPage","pengajuanPage","riwayatPage","cairPage","profilPage","notifPage"]
  .forEach(p=>document.getElementById(p).style.display="none");

  document.getElementById(page).style.display="block";
}

// ANIMASI SALDO
function animasiSaldo(target){
  let el = document.getElementById("saldo");
  let angka = 0;

  let interval = setInterval(()=>{
    angka += Math.ceil(target/30);

    if(angka >= target){
      angka = target;
      clearInterval(interval);
    }

    el.innerText = "Rp " + angka.toLocaleString("id-ID");

  },30);
}

// PROSES PINJAMAN
function proses(){

  let hasil = document.getElementById("hasil");

  let gaji = parseInt(document.getElementById("gaji").value || 0);
  let pinjam = parseInt(document.getElementById("pinjam").value || 0);
  let bulan = parseInt(document.getElementById("bulan").value);

  let limit = gaji * 5;
  let cicilan = pinjam / bulan;

  let status = pinjam > limit ? "❌ Ditolak" : "✅ Disetujui";

  hasil.innerHTML = `
    <div class="card">
      💰 Limit: Rp ${limit.toLocaleString("id-ID")}<br>
      Cicilan: Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
      Status: ${status}
    </div>
  `;

  localStorage.setItem("nama", document.getElementById("nama").value);
  localStorage.setItem("nik", document.getElementById("nik").value);
  localStorage.setItem("limit", limit);

  simpanRiwayat(pinjam,status);
  tampilRiwayat();

  notif("Pengajuan berhasil");

  loadData();
}

// RIWAYAT
function simpanRiwayat(pinjam,status){
  let r = JSON.parse(localStorage.getItem("riwayat"))||[];
  r.push({pinjam,status});
  localStorage.setItem("riwayat",JSON.stringify(r));
}

function tampilRiwayat(){
  let r = JSON.parse(localStorage.getItem("riwayat"))||[];
  let html="";
  r.forEach(i=>{
    html+=`<div class="card">
      Rp ${i.pinjam.toLocaleString("id-ID")} - ${i.status}
    </div>`;
  });
  document.getElementById("riwayatBox").innerHTML=html;
}

// NOTIF
function notif(text){
  let n = document.getElementById("notifBox");
  n.innerHTML = <div class="card">${text}</div> + n.innerHTML;
}

// LOAD DATA
function loadData(){
  let nama = localStorage.getItem("nama") || "Nasabah";
  let nik = localStorage.getItem("nik") || "-";
  let limit = parseInt(localStorage.getItem("limit") || 0);

  document.getElementById("namaUser").innerText = nama;
  document.getElementById("profilNama").innerText = nama;
  document.getElementById("profilNik").innerText = nik;

  animasiSaldo(limit);
}

window.onload = loadData;

</script>

</body>
</html>
