<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding:15px;
  padding-bottom:80px;
}

.header {
  background: linear-gradient(to right, #f59e0b, #f97316);
  padding:15px;
  border-radius:16px;
  color:white;
  margin-bottom:15px;
}

.container {
  background:white;
  border-radius:20px;
  padding:20px;
}

input, select {
  width:100%;
  border:none;
  border-bottom:1px solid #ccc;
  padding:10px 0;
  margin-top:10px;
}

button {
  width:100%;
  margin-top:20px;
  padding:15px;
  border-radius:30px;
  border:none;
  background: linear-gradient(to right,#f59e0b,#f97316);
  color:white;
  font-weight:bold;
}

.result { margin-top:20px; }

.bottom-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}
</style>
</head>

<body>

<div class="header">
  Selamat datang 👋
</div>

<div class="container">

  <h2>Pengajuan Pinjaman</h2>

  <input id="nama" placeholder="Nama">
  <input id="nik" placeholder="NIK">
  <input id="gaji" placeholder="Penghasilan">
  <input id="pinjam" placeholder="Pinjaman">

  <select id="bulan">
    <option value="12">1 Tahun</option>
    <option value="24">2 Tahun</option>
    <option value="60">5 Tahun</option>
    <option value="120">10 Tahun</option>
  </select>

  <button onclick="proses()">Ajukan</button>

  <div id="hasil" class="result"></div>

</div>

<div class="bottom-bar">
  <div>🏠</div>
  <div>💳</div>
  <div>👤</div>
</div>

<script>
function proses(){

  let hasil = document.getElementById("hasil");

  hasil.innerHTML = "🚀 Memproses...";

  setTimeout(() => {

    let gaji = parseInt(document.getElementById("gaji").value);
    let pinjam = parseInt(document.getElementById("pinjam").value);
    let bulan = parseInt(document.getElementById("bulan").value);

    let limit = gaji * 5;
    let cicilan = pinjam / bulan;

    let status = pinjam > limit ? "❌ Ditolak" : "✅ Disetujui";

    hasil.innerHTML = `
      <h3>💳 Hasil</h3>
      Limit: Rp ${limit.toLocaleString("id-ID")}<br>
      Cicilan: Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
      Status: ${status}
    `;

  }, 2000);
}
</script>

</body>
</html>
