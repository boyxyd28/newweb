<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding: 15px;
}

/* HEADER */
.header {
  background: linear-gradient(to right, #f59e0b, #f97316);
  padding: 15px;
  border-radius: 16px;
  color: white;
  margin-bottom: 15px;
}

/* CARD */
.container {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
}

/* INPUT */
.input-group {
  margin-top: 15px;
}

input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: white;
  font-weight: bold;
}

/* RESULT */
.result {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  Selamat datang, Nasabah 👋
</div>

<div class="container">

  <h2>Form Pengajuan</h2>

  <!-- NAMA -->
  <div class="input-group">
    <input id="nama" placeholder="Nama">
  </div>

  <!-- NIK -->
  <div class="input-group">
    <input id="nik" placeholder="NIK">
  </div>

  <!-- ✅ FIX POSISI (DI LUAR) -->
  <div id="success" style="color:green; margin-top:10px; display:none;">
    ✔ NIK valid
  </div>

  <!-- GAJI -->
  <div class="input-group">
    <input id="gaji" placeholder="Penghasilan">
  </div>

  <!-- PINJAMAN -->
  <div class="input-group">
    <input id="pinjam" placeholder="Pinjaman">
  </div>

  <!-- DURASI -->
  <div class="input-group">
    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
      <option value="120">10 Tahun</option>
    </select>
  </div>

  <button onclick="proses()">Ajukan</button>

  <div class="result" id="hasil"></div>

</div>

<script>

function proses(){

  let nik = document.getElementById("nik").value;

  // VALIDASI SEDERHANA
  if(nik.length < 16){
    document.getElementById("success").style.display = "none";
    alert("NIK tidak valid");
    return;
  }

  // ✅ TAMPILKAN CENTANG
  document.getElementById("success").style.display = "block";

  let gaji = parseInt(document.getElementById("gaji").value);
  let pinjam = parseInt(document.getElementById("pinjam").value);
  let bulan = parseInt(document.getElementById("bulan").value);

  let limit = gaji * 5;
  let cicilan = pinjam / bulan;

  let status = "Disetujui ✅";

  if(pinjam > limit){
    status = "Ditolak ❌";
  }

  document.getElementById("hasil").innerHTML = `
    <b>Limit:</b> Rp ${limit.toLocaleString("id-ID")}<br>
    <b>Cicilan:</b> Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
    <b>Status:</b> ${status}
  `;
}

</script>

</body>
</html>
