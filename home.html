<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: linear-gradient(to right, #6a1b9a, #9c27b0);
  color: white;
  padding: 20px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

/* SALDO */
.saldo {
  margin-top: 10px;
  font-size: 28px;
  font-weight: bold;
}

/* CARD */
.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #6a1b9a, #ab47bc);
  color: white;
  font-size: 16px;
  font-weight: bold;
}

/* HASIL */
.result {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Halo, Nasabah</h2>
  <div class="saldo" id="saldo">Rp 0</div>
</div>

<!-- FORM -->
<div class="card">
  <h3>Pengajuan Pinjaman</h3>

  <input type="text" id="nama" placeholder="Nama Lengkap">
  <input type="number" id="nik" placeholder="NIK (16 digit)">
  <input type="number" id="gaji" placeholder="Penghasilan per bulan">

  <button onclick="hitung()">Ajukan Sekarang</button>

  <div class="result" id="hasil"></div>
</div>

<script>

/* ANIMASI SALDO */
let saldo = 0;
let target = 12500000;

let interval = setInterval(() => {
  saldo += 250000;
  document.getElementById("saldo").innerText =
    "Rp " + saldo.toLocaleString("id-ID");

  if (saldo >= target) clearInterval(interval);
}, 50);

/* ANALISA PINJAMAN */
function hitung() {

  const nama = document.getElementById("nama").value;
  const nik = document.getElementById("nik").value;
  const gaji = parseInt(document.getElementById("gaji").value);

  if (!nama || nik.length < 16 || !gaji) {
    alert("Data belum lengkap");
    return;
  }

  let limit = gaji * 5;
  let cicilan = limit / 12;

  let status = "Disetujui ✅";

  if (gaji < 2000000) {
    status = "Ditolak ❌";
  }

  document.getElementById("hasil").innerHTML = `
    <br>
    <b>Nama:</b> ${nama}<br>
    <b>Limit Pinjaman:</b> Rp ${limit.toLocaleString("id-ID")}<br>
    <b>Cicilan / bulan:</b> Rp ${Math.floor(cicilan).toLocaleString("id-ID")}<br>
    <b>Status:</b> ${status}
  `;
}
</script>

</body>
</html>
