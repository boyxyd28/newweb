<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding: 15px;
  padding-bottom: 80px;
}

.header {
  background: linear-gradient(to right, #f59e0b, #f97316);
  padding: 15px;
  border-radius: 16px;
  color: white;
  margin-bottom: 15px;
}

.container {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.input-group {
  margin-top: 15px;
}

input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
}

.card-info {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-top: 12px;
}

.card-info.highlight {
  background: linear-gradient(to right, orange, red);
  color: white;
}

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 12px;
}
</style>
</head>

<body>

<div class="header">
  Selamat datang, Nasabah 👋
</div>

<div class="container">

  <h2>Form Pengajuan</h2>

  <div class="input-group">
    <input id="nama" placeholder="Nama">
  </div>

  <div class="input-group">
    <input id="nik" placeholder="NIK">
  </div>

  <div id="success" style="color:green; display:none;">
    ✔ NIK valid
  </div>

  <div class="input-group">
    <input id="gaji" placeholder="Penghasilan">
  </div>

  <div class="input-group">
    <input id="pinjam" placeholder="Pinjaman">
  </div>

  <div class="input-group">
    <select id="bulan">
      <option value="12">1 Tahun</option>
      <option value="24">2 Tahun</option>
      <option value="60">5 Tahun</option>
      <option value="120">10 Tahun</option>
    </select>
  </div>

  <button onclick="proses()">Ajukan</button>

  <div id="hasil" class="result"></div>

</div>

<!-- INFO -->
<div class="card-info">⚡ Proses cepat</div>
<div class="card-info">💰 Tanpa biaya admin</div>
<div class="card-info highlight">🔥 Limit besar</div>

<!-- MENU -->
<div class="bottom-bar">
  <div>🏠</div>
  <div>💳</div>
  <div>👤</div>
</div>
