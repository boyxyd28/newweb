<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengajuan Pinjaman</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  padding: 15px;
}

/* CONTAINER */
.container {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  max-width: 480px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
.title {
  text-align: center;
  margin-bottom: 20px;
}

.title h2 {
  font-size: 18px;
}

.title span {
  color: orange;
  font-weight: bold;
}

/* SECTION */
.section {
  margin-top: 20px;
}

.section h3 {
  font-size: 14px;
  background: #fbbf24;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 10px;
}

/* INPUT GROUP */
.input-group {
  margin-bottom: 12px;
}

.input-group label {
  font-size: 12px;
  color: #555;
}

.input-group input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: white;
  font-size: 16px;
  font-weight: bold;
}

/* RESULT */
.result {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    <h2>Form Pengajuan</h2>
    <span>Bank Jago</span>
  </div>

  <!-- DATA DIRI -->
  <div class="section">
    <h3>1. Data Pribadi</h3>

    <div class="input-group">
      <label>Nama Lengkap</label>
      <input id="nama">
    </div>

    <div class="input-group">
      <label>NIK</label>
      <input id="nik">
    </div>
  </div>

  <!-- KONTAK -->
  <div class="section">
    <h3>2. Kontak</h3>

    <div class="input-group">
      <label>No HP</label>
      <input id="hp">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input id="email">
    </div>
  </div>

  <!-- PEKERJAAN -->
  <div class="section">
    <h3>3. Pekerjaan</h3>

    <div class="input-group">
      <label>Pekerjaan</label>
      <input id="kerja">
    </div>

    <div class="input-group">
      <label>Penghasilan / bulan</label>
      <input id="gaji" type="number">
    </div>
  </div>

  <!-- PINJAMAN -->
  <div class="section">
    <h3>4. Pinjaman</h3>

    <div class="input-group">
      <label>Jumlah Pinjaman</label>
      <input id="pinjam" type="number">
    </div>

    <div class="input-group">
      <label>Durasi (bulan)</label>
      <input id="bulan" type="number">
    </div>
  </div>

  <button onclick="proses()">Ajukan Sekarang</button>

  <div class="result" id="hasil"></div>

</div>

<script>
function proses() {

  const nama = document.getElementById("nama").value;
  const nik = document.getElementById("nik").value;
  const gaji = parseInt(document.getElementById("gaji").value);
  const pinjam = parseInt(document.getElementById("pinjam").value);
  const bulan = parseInt(document.getElementById("bulan").value);

  if (!nama || nik.length < 16 || !gaji || !pinjam || !bulan) {
    alert("Lengkapi data");
    return;
  }

  let limit = gaji * 5;
  let cicilan = pinjam / bulan;

  let status = "Disetujui ✅";

  if (pinjam > limit) {
    status = "Melebihi limit ❌";
  }

  document.getElementById("hasil").innerHTML = `
    <b>Limit Anda:</b> Rp ${limit.toLocaleString("id-ID")}<br>
    <b>Cicilan:</b> Rp ${Math.floor(cicilan).toLocaleString("id-ID")} / bulan<br>
    <b>Status:</b> ${status}
  `;
}
</script>

</body>
</html>
