<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pinjaman Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>Pinjaman fleksibel</h2>

  <label>Jumlah Pinjaman</label>
  <h1 id="amount">Rp 10.000.000</h1>

  <input type="range" min="1000000" max="50000000" value="10000000" id="slider">

  <p>Estimasi cicilan: <span id="result">Rp 900.000</span> / bulan</p>

  <button>Ajukan Sekarang</button>
</div>

<script src="script.js"></script>
</body>
</html>
