<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinjaman Cepat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <h3 class="badge">Pinjaman Cepat</h3>

    <h1>Pinjaman fleksibel,<br>cair instan</h1>

    <p class="desc">Ajukan pinjaman dengan proses cepat & mudah</p>

    <h2 id="amount">Rp 10.000.000</h2>

    <input type="range" min="1000000" max="50000000" value="10000000" id="slider">

    <p class="result">Estimasi: <span id="result">Rp 900.000</span> / bulan</p>

    <button onclick="goToLogin()">Ajukan Sekarang</button>

    <!-- FITUR -->
    <div class="features">

      <div class="item">
        ⚡ <b>Cair instan</b>
        <p>Proses cepat dalam hitungan menit</p>
      </div>

      <div class="item">
        💼 <b>Tanpa biaya admin</b>
        <p>Lebih hemat dan transparan</p>
      </div>

      <div class="item">
        📅 <b>Tenor fleksibel</b>
        <p>Pilih sesuai kebutuhan kamu</p>
      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
