<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #000;
}

/* HEADER */
.header {
  padding: 20px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* IMAGE */
.banner {
  width: 100%;
  border-radius: 20px;
  margin: 20px 0;
}

/* TEXT */
h1 {
  margin: 0;
}

.desc {
  font-size: 14px;
  margin-top: 8px;
  margin-bottom: 25px;
}

/* INPUT */
.input-box label {
  font-size: 13px;
}

.input-box input {
  width: 100%;
  padding: 14px 0;
  border: none;
  border-bottom: 2px solid #000;
  background: transparent;
  font-size: 18px;
  outline: none;
}

/* BUTTON */
button {
  margin-top: 40px;
  width: 100%;
  padding: 15px;
  border-radius: 999px;
  border: none;
  background: #000;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
  ← Log In
</div>

<div class="container">

  <!-- GAMBAR -->
  <img src="nik.jpg" class="banner">

  <h1>Halo!</h1>

  <div class="desc">
    Masukkan NIK KTP untuk melanjutkan proses verifikasi
  </div>

  <div class="input-box">
    <label>NIK KTP</label>
    <input type="number" placeholder="16 digit">
  </div>

  <button>Lanjut</button>

</div>

</body>
</html>
