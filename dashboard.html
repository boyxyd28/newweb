<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIK</title>

<style>

/* RESET TOTAL */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* FULL SCREEN ORANGE */
html, body {
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 18px;
  display: flex;
  align-items: center;
  color: black;
}

/* CONTENT FLEX */
.content {
  flex: 1;
  padding: 20px;
}

h1 {
  margin-top: 20px;
  font-size: 28px;
}

p {
  margin-top: 10px;
  color: #333;
}

/* INPUT STYLE APP */
.input-line {
  margin-top: 30px;
}

.input-line input {
  width: 100%;
  border: none;
  border-bottom: 2px solid black;
  padding: 10px 0;
  font-size: 18px;
  background: transparent;
  outline: none;
}

/* BUTTON FIX DI BAWAH */
.footer {
  padding: 20px;
}

.footer button {
  width: 100%;
  padding: 18px;
  border-radius: 30px;
  border: none;
  background: black;
  color: white;
  font-size: 18px;
}

</style>
</head>

<body>

<div class="header">
  ← Log In
</div>

<div class="content">
  <h1>Masukkan NIK kamu</h1>
  <p>Untuk lanjut, silakan masukkan NIK kamu.</p>

  <div class="input-line">
    <input type="number" placeholder="16 digit" id="nik">
  </div>
</div>

<div class="footer">
  <button onclick="lanjut()">Lanjut</button>
</div>

<script>
function lanjut() {
  const nik = document.getElementById("nik").value;

  if (nik.length < 16) {
    alert("NIK harus 16 digit");
    return;
  }

  // 🔥 pindah ke OTP
  window.location.href = "otp.html";
}
</script>

</body>
</html>
