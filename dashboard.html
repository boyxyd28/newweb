<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masukkan NIK</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* FULL ORANGE BACKGROUND */
body {
  height:100vh;
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  padding:20px;
  font-size:18px;
  display:flex;
  align-items:center;
}

.header span {
  margin-left:10px;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
}

h1 {
  margin-top:20px;
  font-size:28px;
}

p {
  margin-top:10px;
  color:#333;
}

/* INPUT STYLE APP */
.input-box {
  margin-top:40px;
}

.input-box input {
  width:100%;
  border:none;
  border-bottom:2px solid black;
  padding:12px 0;
  font-size:20px;
  background:transparent;
  outline:none;
  letter-spacing:2px;
}

/* BUTTON FIXED */
.footer {
  padding:20px;
}

.footer button {
  width:100%;
  padding:18px;
  border-radius:30px;
  border:none;
  background:#000;
  color:white;
  font-size:18px;
  opacity:0.4;
  transition:0.2s;
}

/* ACTIVE BUTTON */
.footer button.active {
  opacity:1;
}

/* ERROR TEXT */
.error {
  margin-top:10px;
  color:red;
  font-size:13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  ← <span>Log In</span>
</div>

<!-- CONTENT -->
<div class="content">

  <h1>Masukkan NIK kamu</h1>
  <p>Untuk lanjut, silakan masukkan NIK kamu.</p>

  <div class="input-box">
    <input id="nik" maxlength="16" placeholder="16 digit">
    <div id="error" class="error"></div>
  </div>

</div>

<!-- BUTTON -->
<div class="footer">
  <button id="btn">Lanjut</button>
</div>

<script>

let input = document.getElementById("nik");
let btn = document.getElementById("btn");
let error = document.getElementById("error");

/* AKTIFKAN BUTTON */
input.addEventListener("input", function(){

  this.value = this.value.replace(/\D/g,"");

  if(this.value.length === 16){
    btn.classList.add("active");
    btn.style.opacity = "1";
  } else {
    btn.classList.remove("active");
    btn.style.opacity = "0.4";
  }

});

/* VALIDASI LEVEL REAL */
function validasiNIK(nik){

  if(!/^\d{16}$/.test(nik)) return "NIK harus 16 digit";

  let tanggal = parseInt(nik.substring(6,8));
  let bulan = parseInt(nik.substring(8,10));

  if(tanggal > 40) tanggal -= 40;

  if(tanggal < 1 || tanggal > 31) return "Tanggal tidak valid";
  if(bulan < 1 || bulan > 12) return "Bulan tidak valid";

  if(/^(\d)\1+$/.test(nik)) return "NIK tidak valid";

  return true;
}

/* CLICK BUTTON */
btn.onclick = () => {

  let nik = input.value;

  let cek = validasiNIK(nik);

  if(cek !== true){

    error.innerText = cek;

    // 🔥 efek getar
    document.body.classList.add("shake");

    setTimeout(()=>{
      document.body.classList.remove("shake");
    },300);

    return;
  }

  error.innerText = "";

  localStorage.setItem("nik", nik);

  window.location.href = "home.html";
};

</script>

</body>
</html>
