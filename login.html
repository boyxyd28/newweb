<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #16a34a, #4ade80);
}

.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 340px;
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  padding: 20px;
  text-align: center;
}

.slider {
  width: 100%;
  height: 140px;
  margin-bottom: 18px;
  border-radius: 16px;
  overflow: hidden;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h2 {
  color: #16a34a;
  margin: 10px 0 18px;
}

input {
  width: 92%;
  padding: 13px;
  margin: 7px 0;
  border: 1px solid #ddd;
  border-radius: 12px;
}

button {
  width: 95%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(to right, #16a34a, #22c55e);
  color: #fff;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="slider">
      <img src="artos.jpg">
    </div>

    <h2>Login</h2>

    <input type="text" placeholder="Email atau No HP">
    <input type="password" placeholder="Password">

    <button>Aktivasi Pinjaman</button>

  </div>
</div>

</body>
</html>
