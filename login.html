<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #f59e0b, #fbbf24);
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 30px 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      color: #f59e0b;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 95%;
      padding: 14px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(to right, #f59e0b, #fbbf24);
      color: white;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Login</h2>

    <input type="text" id="email" placeholder="Email atau No HP">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Masuk</button>
  </div>
</div>

<script>
function login() {
  const input = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
  const phoneRegex = /^[0-9]{10,13}$/;

  if (!emailRegex.test(input) && !phoneRegex.test(input)) {
    alert("Masukkan email atau nomor HP yang valid");
    return;
  }

  const passwordRegex = /^(?=.[a-z])(?=.[A-Z])(?=.*\\d).{8,}$/;

  if (!passwordRegex.test(password)) {
    alert("Password minimal 8 karakter, ada huruf besar, kecil, dan angka");
    return;
  }

  alert("Login berhasil!");
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
