<script>

// nomor HP
let hp = localStorage.getItem("noHP") || "08xxxx";
let sensor = hp.replace(/(\d{4})\d+(\d{3})/, "$1**$2");

// loading fake
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("infoHP").innerText =
    "Kode dikirim ke WhatsApp " + sensor;

}, 1500);

// input OTP auto pindah
const inputs = document.querySelectorAll(".otp-box input");

inputs.forEach((input, i) => {
  input.addEventListener("input", () => {
    if(input.value && i < inputs.length - 1){
      inputs[i+1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if(e.key === "Backspace" && !input.value && i > 0){
      inputs[i-1].focus();
    }
  });
});

// paste OTP
document.addEventListener("paste", (e) => {
  let paste = e.clipboardData.getData("text").slice(0,6);
  inputs.forEach((input, i) => {
    input.value = paste[i] || "";
  });
});
