<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  display: flex;
  flex-direction: column;
}

.header {
  padding: 20px;
  font-size: 18px;
}

.content {
  flex: 1;
  padding: 20px;
}

h1 {
  font-size: 28px;
}

.otp-box {
  display: flex;
  gap: 10px;
  margin-top: 30px;
}

.otp-box input {
  width: 45px;
  height: 55px;
  text-align: center;
  font-size: 22px;
  border: none;
  border-bottom: 2px solid black;
  background: transparent;
}

.btn {
  margin-top: 30px;
}

.btn button {
  width: 100%;
  padding: 16px;
  border-radius: 30px;
  border: none;
  background: black;
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">← Log In</div>

<div class="content">

<h1>Masukkan kode OTP</h1>

<div class="otp-box">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
</div>

<div class="btn">
  <button id="btn">Verifikasi</button>
</div>

</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");
const btn = document.getElementById("btn");

btn.onclick = () => {
  let kode = "";
  inputs.forEach(i => kode += i.value);

  if (kode.length < 6) {
    alert("Kode belum lengkap");
    return;
  }

  window.location.href = "home.html";
};
</script>

</body>
</html>
