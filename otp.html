<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f59e0b, #fb923c);
  color: #000;
}

/* HEADER */
.header {
  padding: 20px;
  font-weight: bold;
}

/* CONTENT */
.container {
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  margin-bottom: 25px;
}

/* OTP BOX */
.otp-box {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.otp-box input {
  width: 40px;
  height: 50px;
  text-align: center;
  font-size: 20px;
  border: none;
  border-bottom: 2px solid #000;
  background: transparent;
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 14px;
  width: 100%;
  border-radius: 999px;
  border: none;
  background: #000;
  color: #fff;
  font-weight: bold;
}

/* TIMER */
.timer {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  ← Log In
</div>

<div class="container">

  <h1>Halo!</h1>

  <div class="desc">
    Masukkan kode yang telah kami kirim lewat <b>WhatsApp</b><br>
    ke +6285****164
  </div>

  <div>Kode verifikasi</div>

  <div class="otp-box">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
  </div>

  <button class="btn" onclick="verifikasi()">Verifikasi</button>

  <div class="timer">
    Kirim ulang dalam <span id="time">60</span> detik
  </div>

</div>

<script>
let waktu = 60;
let timer = setInterval(() => {
  waktu--;
  document.getElementById("time").innerText = waktu;

  if (waktu <= 0) {
    clearInterval(timer);
  }
}, 1000);

function verifikasi() {
  alert("OTP diproses...");
}
</script>

</body>
</html>
