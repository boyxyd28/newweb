<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  background: linear-gradient(to bottom, #f9a825, #f57c00);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 18px;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* TITLE */
h1 {
  font-size: 26px;
}

/* OTP BOX */
.otp-box {
  display: flex;
  gap: 10px;
  margin-top: 30px;
  justify-content: center;
}

.otp-box input {
  width: 48px;
  height: 58px;
  text-align: center;
  font-size: 24px;
  border: none;
  border-bottom: 2px solid black;
  background: transparent;
  transition: 0.2s;
}

.otp-box input.filled {
  transform: scale(1.15);
  border-bottom: 3px solid black;
}

.otp-box input:focus {
  outline: none;
  border-bottom: 3px solid black;
}

/* BUTTON */
.btn {
  margin-top: 30px;
}

.btn button {
  width: 100%;
  padding: 16px;
  border-radius: 30px;
  border: none;
  background: #ccc;
  color: white;
  font-size: 18px;
}
</style>

</head>

<body>

<div class="header">← Log In</div>

<div class="content">

<h1>Masukkan kode OTP</h1>

<div class="otp-box">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
</div>

<div class="btn">
  <button id="btn">Verifikasi</button>
</div>

</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");
const btn = document.getElementById("btn");

inputs[0].focus();

inputs.forEach((input, index) => {

  input.addEventListener("input", () => {
    input.value = input.value.replace(/[^0-9]/g, "");

    if (input.value) {
      input.classList.add("filled");
      if (index < 5) inputs[index + 1].focus();
    } else {
      input.classList.remove("filled");
    }

    cek();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });

});

function cek() {
  let kode = "";
  inputs.forEach(i => kode += i.value);

  if (kode.length === 6) {
    btn.style.background = "black";
  } else {
    btn.style.background = "#ccc";
  }
}

btn.onclick = () => {
  let kode = "";
  inputs.forEach(i => kode += i.value);

  if (kode.length < 6) {
    alert("Kode belum lengkap");
    return;
  }

  btn.innerText = "Memproses...";

  setTimeout(() => {
    window.location.href = "home.html";
  }, 1000);
};
</script>

</body>
</html>
