<script>

let waktu = 60;
let kodeAsli = "";

// generate OTP
function generateOTP(){
  return Math.floor(100000 + Math.random() * 900000).toString();
}

// kirim OTP
function kirimOTP(){
  kodeAsli = generateOTP();
  localStorage.setItem("otp", kodeAsli);

  alert("Kode OTP: " + kodeAsli);
}

// timer
function startTimer(){
  let btn = document.getElementById("resendBtn");

  let interval = setInterval(()=>{
    waktu--;
    btn.innerText = "Kirim ulang ("+waktu+")";

    if(waktu <= 0){
      clearInterval(interval);
      btn.disabled = false;
      btn.innerText = "Kirim ulang";
    }
  },1000);
}

// resend
function kirimUlang(){
  waktu = 60;
  document.getElementById("resendBtn").disabled = true;
  kirimOTP();
  startTimer();
}

// verifikasi
function verifikasi(){
  let input = document.getElementById("kode").value;
  let otp = localStorage.getItem("otp");

  if(input !== otp){
    alert("Kode salah!");
    return;
  }

  let nama = localStorage.getItem("nama_temp");
  let nik = localStorage.getItem("nik_temp");

  localStorage.setItem("nama", nama);
  localStorage.setItem("nik", nik);
  localStorage.setItem("isLogin", "true");

  localStorage.removeItem("nama_temp");
  localStorage.removeItem("nik_temp");
  localStorage.removeItem("otp");

  window.location.href = "home.html";
}

// auto jalan
kirimOTP();
startTimer();

</script>
